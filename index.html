const { useState, useEffect, useRef } = React;

const GRAD = 'linear-gradient(135deg, #1d6bf3, #e61e49)';
const GT = { background: GRAD, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' };

function FadeIn({ children, delay = 0 }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); observer.disconnect(); } },
      { threshold: 0.08 }
    );
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(20px)',
      transition: `opacity 0.55s ease ${delay}ms, transform 0.55s ease ${delay}ms`,
    }}>
      {children}
    </div>
  );
}

function lerpColor(t) {
  const r = Math.round(29 + t * (230 - 29));
  const g = Math.round(107 + t * (30 - 107));
  const b = Math.round(243 + t * (73 - 243));
  return [r, g, b];
}

function NeuralNetBg({ nodeCount = 80 }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId;
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    window.addEventListener('resize', resize);
    const nodes = Array.from({ length: nodeCount }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.8 + 1,
      t: Math.random(),
    }));
    const draw = () => {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > w) n.vx *= -1;
        if (n.y < 0 || n.y > h) n.vy *= -1;
      });
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 200) {
            const [r, g, b] = lerpColor((nodes[i].t + nodes[j].t) / 2);
            ctx.beginPath();
            ctx.strokeStyle = `rgb(${r},${g},${b})`;
            ctx.globalAlpha = (1 - dist / 200) * 0.28;
            ctx.lineWidth = 1;
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.stroke();
          }
        }
      }
      nodes.forEach(n => {
        const [r, g, b] = lerpColor(n.t);
        ctx.beginPath();
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.globalAlpha = 0.65;
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={canvasRef} style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', display: 'block' }} />;
}

function PillBtn({ children, dark = false, ghost = false, accent = false, outlined = false, onClick, href, small = false }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    borderRadius: '9999px',
    padding: small ? '10px 22px' : '14px 32px',
    fontSize: small ? '14px' : '16px',
    fontFamily: 'var(--display-font)',
    fontWeight: 500,
    letterSpacing: '0.01em',
    cursor: 'pointer',
    textDecoration: 'none',
    transition: 'opacity 0.18s, background 0.18s',
    border: '2px solid transparent',
    whiteSpace: 'nowrap',
  };
  let style = { ...base };
  if (dark)     style = { ...style, background: '#191c1f', color: '#fff', borderColor: '#191c1f' };
  if (ghost)    style = { ...style, background: 'rgba(244,244,244,0.1)', color: '#f4f4f4', border: 'none' };
  if (accent)   style = { ...style, background: GRAD, color: '#fff', border: 'none' };
  if (outlined) style = { ...style, background: 'transparent', color: '#fff', borderColor: 'rgba(255,255,255,0.5)' };
  const [hov, setHov] = useState(false);
  const el = href ? 'a' : 'button';
  return React.createElement(el, {
    href, onClick,
    style: { ...style, opacity: hov ? 0.82 : 1 },
    onMouseEnter: () => setHov(true),
    onMouseLeave: () => setHov(false),
  }, children);
}

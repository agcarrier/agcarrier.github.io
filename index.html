/* ─────────────────────────────────────────

───────────────────────────────────────── */

function PillBtn({ children, dark = false, ghost = false, teal = false, outlined = false, onClick, href, small = false }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    borderRadius: '9999px',
    padding: small ? '10px 22px' : '14px 32px',
    fontSize: small ? '14px' : '16px',
    fontFamily: 'var(--display-font)',
    fontWeight: 500,
    letterSpacing: '0.01em',
    cursor: 'pointer',
    textDecoration: 'none',
    transition: 'opacity 0.18s, background 0.18s',
    border: '2px solid transparent',
    whiteSpace: 'nowrap',
  };
  let style = { ...base };
  if (dark)     { style = { ...style, background: '#191c1f', color: '#fff', borderColor: '#191c1f' }; }
  if (ghost)    { style = { ...style, background: 'rgba(244,244,244,0.1)', color: '#f4f4f4', borderColor: '#f4f4f4' }; }
  if (teal)     { style = { ...style, background: 'var(--teal)', color: '#fff', borderColor: 'var(--teal)' }; }
  if (outlined) { style = { ...style, background: 'transparent', color: '#fff', borderColor: 'rgba(255,255,255,0.5)' }; }

  const [hov, setHov] = useState(false);
  const el = href ? 'a' : 'button';
  return React.createElement(el, {
    href, onClick,
    style: { ...style, opacity: hov ? 0.82 : 1 },
    onMouseEnter: () => setHov(true),
    onMouseLeave: () => setHov(false),
  }, children);
}

/* ─────────────────────────────────────────
   APP — Design Canvas wrapper
───────────────────────────────────────── */
function App() {
  const { TweaksPanel, useTweaks, TweakSection, TweakRadio } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#1d6bf3",
    "showVariant": "all"
  }/*EDITMODE-END*/;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas title="Andrew Carrier — Personal Website">
        <DCSection id="v1" title="Variation 1 — Classic Revolut Dark">
          <DCArtboard id="v1a" label="Clean & Classic" width={1200} height={2700}>
            <V1 />
          </DCArtboard>
        </DCSection>
        <DCSection id="v2" title="Variation 2 — Cinematic Dark (Glow)">
          <DCArtboard id="v2a" label="Cinematic / Atmospheric" width={1200} height={2800}>
            <V2 />
          </DCArtboard>
        </DCSection>
        <DCSection id="v3" title="Variation 3 — Editorial Grid">
          <DCArtboard id="v3a" label="Editorial / Bold Split" width={1200} height={2900}>
            <V3 />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Accent Color">
          <TweakRadio
            id="accentColor"
            options={[
              { label: 'Teal', value: '#00a87e' },
              { label: 'Blue', value: '#494fdf' },
              { label: 'Pink', value: '#e61e49' },
            ]}
            value={tweaks.accentColor}
            onChange={v => {
              setTweak('accentColor', v);
              document.documentElement.style.setProperty('--teal', v);
              document.documentElement.style.setProperty('--teal-dim', v + '1a');
              document.documentElement.style.setProperty('--teal-glow', v + '33');
            }}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
